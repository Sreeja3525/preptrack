version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: preptrack-postgres
    environment:
      POSTGRES_DB: preptrack_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - preptrack-data:/var/lib/postgresql/data

volumes:
  preptrack-data:
